image: python:3.13

variables:
  UV_VERSION: "0.4"

# Добавляем стадию линтинга перед тестами
stages:
  - lint
  - test

# Новое задание для проверки pre-commit
lint_project:
  stage: lint
  script:
    - curl -LsSf https://astral.sh | sh
    - export PATH="$HOME/.cargo/bin:$PATH"
    - uv sync --dev
    # Запускаем все проверки pre-commit на сервере
    - uv run pre-commit run --all-files
  only:
    - dev
    - stage
    - main
    - merge_requests

test_project:
  stage: test
  script:
    - curl -LsSf https://astral.sh | sh
    - export PATH="$HOME/.cargo/bin:$PATH"
    - uv sync --dev
    - uv run pytest src/tests/ -n auto --cov=src/app --cov-report=html --cov-report=term
    - COVERAGE=$(uv run coverage report | grep TOTAL | awk '{print $NF}')
    - echo "Total Coverage: $COVERAGE"
  artifacts:
    paths:
      - htmlcov/
    expire_in: 1 week
  coverage: '/TOTAL.*\s+(\d+\%)/'
  only:
    - dev
    - stage
    - main
    - merge_requests
